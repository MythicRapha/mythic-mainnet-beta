<svg xmlns="http://www.w3.org/2000/svg" width="800" height="418" viewBox="0 0 800 418" fill="none">
  <defs>
    <!-- Deep dark background with rose-tinted core -->
    <radialGradient id="bg-core" cx="0.5" cy="0.35" r="0.65">
      <stop offset="0" stop-color="#120610"/>
      <stop offset="0.25" stop-color="#0A040C"/>
      <stop offset="0.5" stop-color="#060310"/>
      <stop offset="1" stop-color="#020104"/>
    </radialGradient>

    <!-- Rose atmosphere — main glow -->
    <radialGradient id="atmo-rose" cx="0.5" cy="0.3" r="0.5">
      <stop offset="0" stop-color="#FF2D78" stop-opacity="0.14"/>
      <stop offset="0.2" stop-color="#FF2D78" stop-opacity="0.07"/>
      <stop offset="0.45" stop-color="#FF2D78" stop-opacity="0.025"/>
      <stop offset="1" stop-color="#000" stop-opacity="0"/>
    </radialGradient>

    <!-- Violet accent bottom-left -->
    <radialGradient id="atmo-violet" cx="0.08" cy="0.85" r="0.35">
      <stop offset="0" stop-color="#7B2FFF" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#000" stop-opacity="0"/>
    </radialGradient>

    <!-- Green accent bottom-right -->
    <radialGradient id="atmo-green" cx="0.92" cy="0.75" r="0.25">
      <stop offset="0" stop-color="#39FF14" stop-opacity="0.03"/>
      <stop offset="1" stop-color="#000" stop-opacity="0"/>
    </radialGradient>

    <!-- Prism inner halo (tight) -->
    <radialGradient id="prism-halo" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#FF2D78" stop-opacity="0.30"/>
      <stop offset="0.15" stop-color="#FF2D78" stop-opacity="0.14"/>
      <stop offset="0.35" stop-color="#FF2D78" stop-opacity="0.05"/>
      <stop offset="0.6" stop-color="#FF2D78" stop-opacity="0.015"/>
      <stop offset="1" stop-color="#000" stop-opacity="0"/>
    </radialGradient>

    <!-- Prism outer halo (wide bloom) -->
    <radialGradient id="prism-bloom" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#FF2D78" stop-opacity="0.08"/>
      <stop offset="0.4" stop-color="#FF2D78" stop-opacity="0.025"/>
      <stop offset="1" stop-color="#000" stop-opacity="0"/>
    </radialGradient>

    <!-- Grid fade vertical -->
    <linearGradient id="vgrid" x1="0" y1="0" x2="0" y2="418" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FF2D78" stop-opacity="0"/>
      <stop offset="0.25" stop-color="#FF2D78" stop-opacity="0.025"/>
      <stop offset="0.5" stop-color="#FF2D78" stop-opacity="0.018"/>
      <stop offset="0.75" stop-color="#FF2D78" stop-opacity="0.025"/>
      <stop offset="1" stop-color="#FF2D78" stop-opacity="0"/>
    </linearGradient>

    <!-- Horizontal emphasis scanline -->
    <linearGradient id="scanline" x1="0" y1="0" x2="800" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FF2D78" stop-opacity="0"/>
      <stop offset="0.25" stop-color="#FF2D78" stop-opacity="0.10"/>
      <stop offset="0.5" stop-color="#FF2D78" stop-opacity="0.15"/>
      <stop offset="0.75" stop-color="#FF2D78" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#FF2D78" stop-opacity="0"/>
    </linearGradient>

    <!-- Ecosystem accent bar -->
    <linearGradient id="accent-bar" x1="0" y1="0" x2="800" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FF2D78" stop-opacity="0"/>
      <stop offset="0.08" stop-color="#FF2D78" stop-opacity="0.9"/>
      <stop offset="0.2" stop-color="#FF5C96" stop-opacity="0.7"/>
      <stop offset="0.35" stop-color="#39FF14" stop-opacity="0.5"/>
      <stop offset="0.5" stop-color="#7B2FFF" stop-opacity="0.6"/>
      <stop offset="0.65" stop-color="#00E5FF" stop-opacity="0.5"/>
      <stop offset="0.8" stop-color="#FF9500" stop-opacity="0.6"/>
      <stop offset="0.92" stop-color="#FF2D78" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#FF2D78" stop-opacity="0"/>
    </linearGradient>

    <!-- Badge fill -->
    <linearGradient id="badge-bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FF2D78" stop-opacity="0.08"/>
      <stop offset="0.5" stop-color="#FF2D78" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#FF2D78" stop-opacity="0.08"/>
    </linearGradient>

    <!-- Prism multi-layer glow filter -->
    <filter id="prism-glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="b1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="12" result="b2"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="28" result="b3"/>
      <feMerge>
        <feMergeNode in="b3"/>
        <feMergeNode in="b2"/>
        <feMergeNode in="b1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Text glow -->
    <filter id="txt-glow" x="-20%" y="-30%" width="140%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Stat glow -->
    <filter id="stat-glow" x="-15%" y="-20%" width="130%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ===== BACKGROUND LAYERS ===== -->
  <rect width="800" height="418" fill="url(#bg-core)"/>
  <rect width="800" height="418" fill="url(#atmo-rose)"/>
  <rect width="800" height="418" fill="url(#atmo-violet)"/>
  <rect width="800" height="418" fill="url(#atmo-green)"/>

  <!-- ===== GRID SYSTEM ===== -->
  <!-- Horizontal scans -->
  <g opacity="0.018" stroke="#FF2D78" stroke-width="0.3">
    <line x1="0" y1="52" x2="800" y2="52"/>
    <line x1="0" y1="104" x2="800" y2="104"/>
    <line x1="0" y1="156" x2="800" y2="156"/>
    <line x1="0" y1="208" x2="800" y2="208"/>
    <line x1="0" y1="260" x2="800" y2="260"/>
    <line x1="0" y1="312" x2="800" y2="312"/>
    <line x1="0" y1="364" x2="800" y2="364"/>
  </g>

  <!-- Center horizontal emphasis -->
  <line x1="0" y1="209" x2="800" y2="209" stroke="url(#scanline)" stroke-width="0.5"/>

  <!-- Vertical grid -->
  <line x1="200" y1="0" x2="200" y2="418" stroke="url(#vgrid)" stroke-width="0.4"/>
  <line x1="400" y1="0" x2="400" y2="418" stroke="url(#vgrid)" stroke-width="0.5"/>
  <line x1="600" y1="0" x2="600" y2="418" stroke="url(#vgrid)" stroke-width="0.4"/>
  <g opacity="0.012" stroke="#FF2D78" stroke-width="0.3">
    <line x1="100" y1="0" x2="100" y2="418"/>
    <line x1="300" y1="0" x2="300" y2="418"/>
    <line x1="500" y1="0" x2="500" y2="418"/>
    <line x1="700" y1="0" x2="700" y2="418"/>
  </g>

  <!-- Data convergence lines pointing at prism center (400, 130) -->
  <line x1="0" y1="0" x2="400" y2="130" stroke="#FF2D78" stroke-width="0.25" opacity="0.025"/>
  <line x1="800" y1="0" x2="400" y2="130" stroke="#FF2D78" stroke-width="0.25" opacity="0.025"/>
  <line x1="0" y1="418" x2="400" y2="130" stroke="#FF2D78" stroke-width="0.2" opacity="0.015"/>
  <line x1="800" y1="418" x2="400" y2="130" stroke="#FF2D78" stroke-width="0.2" opacity="0.015"/>
  <line x1="150" y1="0" x2="400" y2="130" stroke="#FF2D78" stroke-width="0.2" opacity="0.018"/>
  <line x1="650" y1="0" x2="400" y2="130" stroke="#FF2D78" stroke-width="0.2" opacity="0.018"/>

  <!-- ===== PARTICLE FIELD ===== -->
  <rect x="55" y="38" width="1.5" height="1.5" fill="#FF2D78" opacity="0.16"/>
  <rect x="145" y="98" width="1" height="1" fill="#FF5C96" opacity="0.12"/>
  <rect x="230" y="55" width="1.5" height="1.5" fill="#FF2D78" opacity="0.14"/>
  <rect x="310" y="140" width="1" height="1" fill="#FF2D78" opacity="0.10"/>
  <rect x="480" y="42" width="1" height="1" fill="#FF5C96" opacity="0.09"/>
  <rect x="570" y="165" width="1.5" height="1.5" fill="#FF2D78" opacity="0.08"/>
  <rect x="660" y="65" width="1" height="1" fill="#FF2D78" opacity="0.12"/>
  <rect x="740" y="105" width="1" height="1" fill="#FF5C96" opacity="0.08"/>
  <rect x="85" y="270" width="1" height="1" fill="#7B2FFF" opacity="0.07"/>
  <rect x="190" y="340" width="1" height="1" fill="#FF2D78" opacity="0.06"/>
  <rect x="610" y="300" width="1" height="1" fill="#CC2460" opacity="0.06"/>
  <rect x="720" y="355" width="1" height="1" fill="#39FF14" opacity="0.05"/>
  <rect x="340" y="380" width="1" height="1" fill="#7B2FFF" opacity="0.04"/>
  <rect x="510" y="250" width="1" height="1" fill="#FF2D78" opacity="0.05"/>
  <rect x="130" y="185" width="1" height="1" fill="#FF2D78" opacity="0.07"/>
  <rect x="680" y="240" width="1" height="1" fill="#FF5C96" opacity="0.05"/>

  <!-- ===== CORNER BRACKETS ===== -->
  <g stroke="#FF2D78" stroke-width="1.3" fill="none" opacity="0.40">
    <line x1="16" y1="16" x2="55" y2="16"/><line x1="16" y1="16" x2="16" y2="55"/>
    <line x1="784" y1="16" x2="745" y2="16"/><line x1="784" y1="16" x2="784" y2="55"/>
    <line x1="16" y1="402" x2="55" y2="402"/><line x1="16" y1="402" x2="16" y2="363"/>
    <line x1="784" y1="402" x2="745" y2="402"/><line x1="784" y1="402" x2="784" y2="363"/>
  </g>

  <!-- ===== HUD CORNER TEXT ===== -->
  <text x="30" y="12" font-family="'JetBrains Mono', 'SF Mono', monospace" font-size="6.5" letter-spacing="2" fill="#FF2D78" opacity="0.45">WALLET::ACTIVE</text>
  <text x="770" y="12" text-anchor="end" font-family="'JetBrains Mono', 'SF Mono', monospace" font-size="6.5" letter-spacing="2" fill="#FF2D78" opacity="0.45">MAINNET::LIVE</text>
  <text x="30" y="414" font-family="'JetBrains Mono', 'SF Mono', monospace" font-size="6.5" letter-spacing="2" fill="#FF2D78" opacity="0.30">WALLET.MYTHIC.SH</text>
  <text x="770" y="414" text-anchor="end" font-family="'JetBrains Mono', 'SF Mono', monospace" font-size="6.5" letter-spacing="2" fill="#FF2D78" opacity="0.30">SOLANA SVM L2</text>

  <!-- ===== PRISM HALOS ===== -->
  <circle cx="400" cy="130" r="165" fill="url(#prism-bloom)"/>
  <circle cx="400" cy="130" r="95" fill="url(#prism-halo)"/>

  <!-- ===== CONVERGENCE PRISM — Rose gem with lock icon ===== -->
  <g filter="url(#prism-glow)">
    <g transform="translate(400, 130)">
      <!-- Left face — primary rose -->
      <polygon points="0,-88 -55,-8 0,14" fill="#FF2D78" opacity="0.92"/>
      <!-- Right face — lighter rose for depth -->
      <polygon points="0,-88 55,-8 0,14" fill="#FF5C96" opacity="0.78"/>
      <!-- Bottom face — darker rose grounding -->
      <polygon points="-55,-8 0,14 55,-8 0,88" fill="#CC2460" opacity="0.88"/>

      <!-- Edge highlights -->
      <line x1="0" y1="-88" x2="0" y2="88" stroke="white" stroke-opacity="0.20" stroke-width="0.7"/>
      <line x1="0" y1="-88" x2="-55" y2="-8" stroke="white" stroke-opacity="0.10" stroke-width="0.4"/>
      <line x1="0" y1="-88" x2="55" y2="-8" stroke="white" stroke-opacity="0.07" stroke-width="0.35"/>
      <line x1="0" y1="14" x2="-55" y2="-8" stroke="white" stroke-opacity="0.06" stroke-width="0.3"/>
      <line x1="0" y1="14" x2="55" y2="-8" stroke="white" stroke-opacity="0.04" stroke-width="0.3"/>
      <line x1="-55" y1="-8" x2="0" y2="88" stroke="white" stroke-opacity="0.025" stroke-width="0.25"/>
      <line x1="55" y1="-8" x2="0" y2="88" stroke="white" stroke-opacity="0.025" stroke-width="0.25"/>

      <!-- Apex highlight -->
      <circle cx="0" cy="-85" r="3.5" fill="white" opacity="0.35"/>
      <circle cx="0" cy="-85" r="8" fill="white" opacity="0.10"/>

      <!-- Inner sparkle points -->
      <circle cx="-16" cy="-40" r="1.2" fill="white" opacity="0.25"/>
      <circle cx="10" cy="-25" r="0.8" fill="white" opacity="0.18"/>
      <circle cx="-6" cy="30" r="0.6" fill="white" opacity="0.10"/>

      <!-- Lock icon inside prism — shield/keyhole -->
      <rect x="-8" y="-8" width="16" height="20" rx="1.5" fill="white" opacity="0.12"/>
      <rect x="-5" y="-14" width="10" height="10" rx="5" fill="none" stroke="white" stroke-width="1.5" opacity="0.12"/>
      <circle cx="0" cy="1" r="2.5" fill="white" opacity="0.18"/>
      <rect x="-1" y="1" width="2" height="5" fill="white" opacity="0.15"/>
    </g>
  </g>

  <!-- ===== ACCENT BAR (ecosystem rainbow) ===== -->
  <rect y="242" width="800" height="2.5" fill="url(#accent-bar)"/>
  <rect y="245" width="800" height="0.4" fill="#FF2D78" opacity="0.03"/>

  <!-- ===== HEADLINE — MYTHIC WALLET ===== -->
  <g filter="url(#txt-glow)">
    <text x="400" y="282" text-anchor="middle" font-family="'Sora', 'Helvetica Neue', sans-serif" font-weight="800" font-size="38" fill="white" letter-spacing="5">MYTHIC WALLET</text>
  </g>

  <!-- Rose underline -->
  <rect x="265" y="290" width="270" height="1.5" fill="#FF2D78" opacity="0.6"/>

  <!-- Tagline -->
  <text x="400" y="312" text-anchor="middle" font-family="'JetBrains Mono', 'SF Mono', monospace" font-weight="500" font-size="10" fill="#FF2D78" letter-spacing="6" opacity="0.80">YOUR KEYS  ·  YOUR CHAIN  ·  YOUR AI</text>

  <!-- ===== FEATURE BADGES ROW ===== -->
  <g transform="translate(0, 0)">
    <!-- Trade -->
    <rect x="78" y="332" width="120" height="24" fill="#FF2D78" fill-opacity="0.04" stroke="#FF2D78" stroke-opacity="0.18" stroke-width="0.6"/>
    <text x="138" y="348" text-anchor="middle" font-family="'JetBrains Mono', 'SF Mono', monospace" font-size="8" font-weight="600" fill="#FF2D78" letter-spacing="2.5" opacity="0.8">SWAP</text>

    <!-- Bridge -->
    <rect x="218" y="332" width="120" height="24" fill="#FF2D78" fill-opacity="0.04" stroke="#FF2D78" stroke-opacity="0.18" stroke-width="0.6"/>
    <text x="278" y="348" text-anchor="middle" font-family="'JetBrains Mono', 'SF Mono', monospace" font-size="8" font-weight="600" fill="#FF2D78" letter-spacing="2.5" opacity="0.8">BRIDGE</text>

    <!-- Stake -->
    <rect x="358" y="332" width="120" height="24" fill="#FF2D78" fill-opacity="0.04" stroke="#FF2D78" stroke-opacity="0.18" stroke-width="0.6"/>
    <text x="418" y="348" text-anchor="middle" font-family="'JetBrains Mono', 'SF Mono', monospace" font-size="8" font-weight="600" fill="#FF2D78" letter-spacing="2.5" opacity="0.8">STAKING</text>

    <!-- AI -->
    <rect x="498" y="332" width="120" height="24" fill="#FF2D78" fill-opacity="0.04" stroke="#FF2D78" stroke-opacity="0.18" stroke-width="0.6"/>
    <text x="558" y="348" text-anchor="middle" font-family="'JetBrains Mono', 'SF Mono', monospace" font-size="8" font-weight="600" fill="#FF2D78" letter-spacing="2.5" opacity="0.8">AI PREVIEW</text>

    <!-- dApp -->
    <rect x="638" y="332" width="120" height="24" fill="#FF2D78" fill-opacity="0.04" stroke="#FF2D78" stroke-opacity="0.18" stroke-width="0.6"/>
    <text x="698" y="348" text-anchor="middle" font-family="'JetBrains Mono', 'SF Mono', monospace" font-size="8" font-weight="600" fill="#FF2D78" letter-spacing="2.5" opacity="0.8">dAPPS</text>
  </g>

  <!-- ===== BOTTOM BAR ===== -->
  <rect y="370" width="800" height="48" fill="#050208"/>
  <rect y="370" width="800" height="0.8" fill="#FF2D78" opacity="0.06"/>

  <!-- Sub-brand gems row (mini ecosystem prisms) -->
  <!-- Network (green) -->
  <g transform="translate(300, 381)">
    <polygon points="5,0 0,4 5,5.5" fill="#39FF14" opacity="0.90"/>
    <polygon points="5,0 10,4 5,5.5" fill="#6FFF4F" opacity="0.75"/>
    <polygon points="0,4 5,5.5 10,4 5,12" fill="#2ACC10" opacity="0.85"/>
  </g>
  <!-- Swap (amber) -->
  <g transform="translate(330, 381)">
    <polygon points="5,0 0,4 5,5.5" fill="#FF9500" opacity="0.88"/>
    <polygon points="5,0 10,4 5,5.5" fill="#FFB340" opacity="0.72"/>
    <polygon points="0,4 5,5.5 10,4 5,12" fill="#CC7700" opacity="0.82"/>
  </g>
  <!-- Money (cyan) -->
  <g transform="translate(360, 381)">
    <polygon points="5,0 0,4 5,5.5" fill="#00E5FF" opacity="0.88"/>
    <polygon points="5,0 10,4 5,5.5" fill="#40EDFF" opacity="0.72"/>
    <polygon points="0,4 5,5.5 10,4 5,12" fill="#00B8CC" opacity="0.82"/>
  </g>
  <!-- Foundation (purple) -->
  <g transform="translate(390, 381)">
    <polygon points="5,0 0,4 5,5.5" fill="#7B2FFF" opacity="0.88"/>
    <polygon points="5,0 10,4 5,5.5" fill="#9B5FFF" opacity="0.72"/>
    <polygon points="0,4 5,5.5 10,4 5,12" fill="#5A1FCC" opacity="0.82"/>
  </g>
  <!-- Wallet (rose — highlighted) -->
  <g transform="translate(420, 379)">
    <polygon points="6,0 0,5 6,7" fill="#FF2D78" opacity="0.95"/>
    <polygon points="6,0 12,5 6,7" fill="#FF5C96" opacity="0.80"/>
    <polygon points="0,5 6,7 12,5 6,15" fill="#CC2460" opacity="0.90"/>
  </g>
  <!-- Labs (white) -->
  <g transform="translate(452, 381)">
    <polygon points="5,0 0,4 5,5.5" fill="#FFFFFF" opacity="0.70"/>
    <polygon points="5,0 10,4 5,5.5" fill="#CCCCCC" opacity="0.55"/>
    <polygon points="0,4 5,5.5 10,4 5,12" fill="#999999" opacity="0.45"/>
  </g>
  <!-- Forge (outline) -->
  <g transform="translate(482, 381)">
    <polygon points="5,0 0,4 5,5.5" fill="none" stroke="#39FF14" stroke-width="0.6" opacity="0.70"/>
    <polygon points="5,0 10,4 5,5.5" fill="none" stroke="#39FF14" stroke-width="0.6" opacity="0.55"/>
    <polygon points="0,4 5,5.5 10,4 5,12" fill="none" stroke="#39FF14" stroke-width="0.6" opacity="0.45"/>
  </g>

  <!-- Bottom tagline -->
  <text x="400" y="408" text-anchor="middle" font-family="'JetBrains Mono', 'SF Mono', monospace" font-size="7" letter-spacing="4" fill="#FF2D78" opacity="0.22">ONE WALLET  ·  THREE PLATFORMS  ·  ZERO FRICTION</text>

  <!-- mythic.sh left / $MYTH right -->
  <text x="45" y="395" font-family="'Sora', sans-serif" font-weight="700" font-size="10" fill="#FF2D78" letter-spacing="2" opacity="0.5">mythic.sh</text>
  <text x="755" y="395" text-anchor="end" font-family="'Sora', sans-serif" font-weight="700" font-size="10" fill="#FF2D78" letter-spacing="2" opacity="0.5">$MYTH</text>

  <!-- ===== BORDER ===== -->
  <rect x="0.5" y="0.5" width="799" height="417" fill="none" stroke="#FF2D78" stroke-width="0.5" opacity="0.12"/>
</svg>