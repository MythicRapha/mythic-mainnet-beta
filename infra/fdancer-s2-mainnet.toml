# -- AI Gateway (configure after deployment) -----------------------------------
# The AI sidecar runs as a separate process alongside the validator.
# It listens for on-chain inference requests from the AI precompiles program
# and routes them to local GPU inference engines (vLLM, Ollama, etc.).
#
# Configure the AI gateway after installation:
#   /etc/mythic/ai-gateway.toml
#
# [ai_gateway]
#   enabled          = true
#   socket_path      = "/run/mythic/ai-gateway.sock"
#   gpu_devices      = ["0"]
#   inference_engine = "vllm"
#   model_cache_path = "/mnt/data/mythic-l2/models"
#   max_batch_size   = 32
#   timeout_ms       = 5000
