# ============================================================================
# Frankendancer Config — Server 2 L2 Mainnet (Joining Validator, AI Tier)
# Server: 20.49.10.158
# Role: Secondary validator joining via gossip from Server 1, AI-capable
# Specs: 48 cores, 377GB RAM, 10TB RAID0 at /mnt/data
# ============================================================================

[name]
  name = "mythic-l2-mainnet-s2"

# -- Identity ------------------------------------------------------------------
# Identity and vote keypairs are generated during deployment.
# These paths are written by deploy-s2-validator.sh.
[consensus]
  identity_path       = "/mnt/data/mythic-l2/keys/server2-identity.json"
  vote_account_path   = "/mnt/data/mythic-l2/keys/server2-vote.json"
  expected_genesis_hash = ""
  wait_for_supermajority_at_slot = 0
  known_validators    = []
  snapshot_fetch      = true
  genesis_fetch       = true
  snapshot_interval_slots = 100

# -- Ledger --------------------------------------------------------------------
[ledger]
  path                = "/mnt/data/mythic-l2/mainnet-ledger"
  limit_size          = 200000000
  accounts_path       = "/mnt/data/mythic-l2/mainnet-ledger/accounts"
  require_tower       = false

# -- RPC -----------------------------------------------------------------------
[rpc]
  port                = 8899
  bind_address        = "0.0.0.0"
  pubsub_port         = 8900
  full_api            = true
  private_rpc         = false
  transaction_history = true
  extended_tx_metadata_storage = true

  enable_rpc_pubsub_block_subscription = true
  enable_rpc_pubsub_vote_subscription  = true
  account_indexes     = ["program-id", "spl-token-owner", "spl-token-mint"]

# -- Gossip --------------------------------------------------------------------
# Joins the network via S1 bootstrap validator
[gossip]
  port                = 8001
  entrypoints         = ["20.96.180.64:8001"]
  host                = "20.49.10.158"

# -- Network -------------------------------------------------------------------
[net]
  dynamic_port_range  = "8100-8200"

# -- Log -----------------------------------------------------------------------
[log]
  path                = "/mnt/data/mythic-l2/logs/fdancer-mainnet.log"
  level_logfile       = "INFO"
  level_stderr        = "WARN"

# -- Tiles (AI tier: 48+ cores) -----------------------------------------------
# Heavier tile layout matching S1 specs for full performance
[tiles]
  layout = "2 net, 2 quic, 4 verify, 1 dedup, 2 resolv, 2 pack, 8 bank, 1 poh, 2 shred, 2 store, 1 metric, 1 sign, 1 plugin"

# -- Snapshots -----------------------------------------------------------------
[snapshots]
  incremental_path    = "/mnt/data/mythic-l2/mainnet-ledger/snapshots"
  full_snapshot_interval_slots     = 25000
  incremental_snapshot_interval_slots = 100

