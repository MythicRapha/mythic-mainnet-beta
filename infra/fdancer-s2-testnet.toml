# ============================================================================
# Frankendancer Config — Server 2 L2 Testnet (Joining Validator)
# Server: 20.49.10.158
# Role: Secondary testnet validator joining via gossip from Server 1
# ============================================================================

[name]
  name = "mythic-l2-testnet-s2"

# ── Identity ───────────────────────────────────────────────────────────────
[consensus]
  identity_path       = "/mnt/data/mythic-l2/keys/server2-testnet-identity.json"
  vote_account_path   = "/mnt/data/mythic-l2/keys/server2-testnet-vote.json"
  expected_genesis_hash = ""
  wait_for_supermajority_at_slot = 0
  known_validators    = []
  snapshot_fetch      = true
  genesis_fetch       = true
  snapshot_interval_slots = 100

# ── Ledger ─────────────────────────────────────────────────────────────────
[ledger]
  path                = "/mnt/data/mythic-l2/testnet-ledger"
  limit_size          = 10000000
  require_tower       = false

# ── RPC ────────────────────────────────────────────────────────────────────
[rpc]
  port                = 8999
  bind_address        = "0.0.0.0"
  pubsub_port         = 9000
  full_api            = true
  private_rpc         = false
  transaction_history = true

# ── Gossip ─────────────────────────────────────────────────────────────────
[gossip]
  port                = 9001
  entrypoints         = ["20.96.180.64:9001"]
  host                = "20.49.10.158"

# ── Network ────────────────────────────────────────────────────────────────
[net]
  dynamic_port_range  = "9200-9400"

# ── Log ────────────────────────────────────────────────────────────────────
[log]
  path                = "/mnt/data/mythic-l2/logs/fdancer-testnet.log"
  level_logfile       = "INFO"
  level_stderr        = "WARN"

# ── Tiles ──────────────────────────────────────────────────────────────────
[tiles]
  layout = "1 net, 1 quic, 1 verify, 1 dedup, 1 resolv, 1 pack, 2 bank, 1 poh, 1 shred, 1 store, 1 metric, 1 sign"

# ── BPF Programs ───────────────────────────────────────────────────────────

[[bpf_program]]
  program_id = "MythBrdg11111111111111111111111111111111111"
  so_path    = "/mnt/data/mythic-l2/target/deploy/mythic_bridge.so"

