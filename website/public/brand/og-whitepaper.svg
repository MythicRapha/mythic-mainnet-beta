  <text x="50" y="614" font-family="Menlo, monospace" font-size="12" fill="rgb(57,255,20)">MYTHIC</text>
  <text x="600" y="614" text-anchor="middle" font-family="Menlo, monospace" font-size="12" letter-spacing="1" fill="white" opacity="0.5">mythic.sh/whitepaper</text>
  <text x="1150" y="614" text-anchor="end" font-family="Menlo, monospace" font-size="12" fill="rgb(123,47,255)">$MYTH</text>

  <!-- === BORDER === -->
  <rect x="0.5" y="0.5" width="1199" height="629" fill="none" stroke="rgb(57,255,20)" stroke-opacity="0.1" stroke-width="0.5"/>
  <rect x="0.5" y="0.5" width="1199" height="629" fill="none" stroke="rgb(123,47,255)" stroke-opacity="0.08" stroke-width="0.5"/>
