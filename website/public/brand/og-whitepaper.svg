  <line x1="0" y1="126" x2="1200" y2="126" stroke="rgb(57,255,20)" stroke-opacity="0.025" stroke-width="0.3"/>
  <line x1="0" y1="189" x2="1200" y2="189" stroke="rgb(123,47,255)" stroke-opacity="0.025" stroke-width="0.3"/>
  <line x1="0" y1="252" x2="1200" y2="252" stroke="rgb(123,47,255)" stroke-opacity="0.025" stroke-width="0.3"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgb(123,47,255)" stroke-opacity="0.025" stroke-width="0.3"/>
  <line x1="0" y1="378" x2="1200" y2="378" stroke="rgb(57,255,20)" stroke-opacity="0.025" stroke-width="0.3"/>
  <line x1="0" y1="441" x2="1200" y2="441" stroke="rgb(57,255,20)" stroke-opacity="0.025" stroke-width="0.3"/>
  <line x1="0" y1="504" x2="1200" y2="504" stroke="rgb(123,47,255)" stroke-opacity="0.025" stroke-width="0.3"/>
  <line x1="0" y1="567" x2="1200" y2="567" stroke="rgb(123,47,255)" stroke-opacity="0.025" stroke-width="0.3"/>

