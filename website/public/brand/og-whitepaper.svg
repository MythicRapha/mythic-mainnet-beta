      <stop offset="0" stop-color="rgb(57,255,20)" stop-opacity="0.1"/>
      <stop offset="0.5" stop-color="rgb(123,47,255)" stop-opacity="0.04"/>
      <stop offset="1" stop-color="rgb(123,47,255)" stop-opacity="0"/>
    </radialGradient>
