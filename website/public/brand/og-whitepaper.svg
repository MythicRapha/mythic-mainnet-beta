  <line x1="450" y1="0" x2="450" y2="630" stroke="rgb(123,47,255)" stroke-opacity="0.02" stroke-width="0.3"/>
  <line x1="750" y1="0" x2="750" y2="630" stroke="rgb(123,47,255)" stroke-opacity="0.02" stroke-width="0.3"/>
