  <line x1="1176" y1="24" x2="1140" y2="24" stroke="rgb(123,47,255)" stroke-opacity="0.3" stroke-width="1"/>
  <line x1="1176" y1="24" x2="1176" y2="60" stroke="rgb(123,47,255)" stroke-opacity="0.3" stroke-width="1"/>
  <line x1="24" y1="606" x2="60" y2="606" stroke="rgb(57,255,20)" stroke-opacity="0.3" stroke-width="1"/>
  <line x1="24" y1="606" x2="24" y2="570" stroke="rgb(57,255,20)" stroke-opacity="0.3" stroke-width="1"/>
  <line x1="1176" y1="606" x2="1140" y2="606" stroke="rgb(123,47,255)" stroke-opacity="0.3" stroke-width="1"/>
