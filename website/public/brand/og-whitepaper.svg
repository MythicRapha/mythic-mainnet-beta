      <stop offset="0.25" stop-color="rgb(57,255,20)" stop-opacity="0.04"/>
      <stop offset="0.5" stop-color="rgb(123,47,255)" stop-opacity="0.04"/>
      <stop offset="0.75" stop-color="rgb(123,47,255)" stop-opacity="0.04"/>
      <stop offset="1" stop-color="rgb(57,255,20)" stop-opacity="0"/>
    </linearGradient>
    <!-- Horizontal emphasis line gradient (green-to-violet) -->
    <linearGradient id="hline" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="rgb(57,255,20)" stop-opacity="0"/>
      <stop offset="0.2" stop-color="rgb(57,255,20)" stop-opacity="0.1"/>
      <stop offset="0.5" stop-color="rgb(123,47,255)" stop-opacity="0.12"/>
      <stop offset="0.8" stop-color="rgb(123,47,255)" stop-opacity="0.1"/>
      <stop offset="1" stop-color="rgb(123,47,255)" stop-opacity="0"/>
