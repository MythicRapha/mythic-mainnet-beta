    <text x="283" y="25" text-anchor="middle" font-family="Menlo, monospace" font-size="8" letter-spacing="2" fill="rgb(123,47,255)" opacity="0.5">BLOCK TIME</text>
    <text x="283" y="47" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-weight="700" font-size="18" fill="white">400ms</text>

    <rect x="390" y="0" width="175" height="60" fill="white" opacity="0.02" stroke="rgb(57,255,20)" stroke-opacity="0.12" stroke-width="0.5"/>
    <text x="478" y="25" text-anchor="middle" font-family="Menlo, monospace" font-size="8" letter-spacing="2" fill="rgb(57,255,20)" opacity="0.5">SUPPLY</text>
    <text x="478" y="47" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-weight="700" font-size="18" fill="white">1B Fixed</text>
