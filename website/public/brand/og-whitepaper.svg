<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" style="fill-rule:evenodd;clip-rule:evenodd;">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="rgb(3,3,8)"/>
      <stop offset="0.4" stop-color="rgb(6,6,14)"/>
      <stop offset="1" stop-color="rgb(3,3,8)"/>
    </linearGradient>
    <!-- Green glow (left) -->
    <radialGradient id="glowGreen" cx="0.35" cy="0.38" r="0.45">
      <stop offset="0" stop-color="rgb(57,255,20)" stop-opacity="0.1"/>
      <stop offset="0.4" stop-color="rgb(57,255,20)" stop-opacity="0.03"/>
      <stop offset="1" stop-color="black" stop-opacity="0"/>
    </radialGradient>
    <!-- Violet glow (right) -->
    <radialGradient id="glowViolet" cx="0.65" cy="0.42" r="0.45">
      <stop offset="0" stop-color="rgb(123,47,255)" stop-opacity="0.1"/>
      <stop offset="0.4" stop-color="rgb(123,47,255)" stop-opacity="0.03"/>
      <stop offset="1" stop-color="black" stop-opacity="0"/>
    </radialGradient>
    <!-- Center blend glow -->
